<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0B" />

    <title>Shoho Pay — UAE Digital Wallet, Crypto, Gold & AI Finance</title>
    <meta name="description" content="Shoho Pay — the UAE's luxury digital wallet for multi-currency payments, crypto, digital gold, and Billy, your AI financial assistant. Built in Dubai." />
    <meta name="keywords" content="Dubai digital wallet, UAE payments app, crypto wallet UAE, AI finance assistant, gold investment app Dubai, multi-currency account" />
    <meta name="author" content="Shoho Pay" />
    <link rel="canonical" href="https://shohopay.com/" />

    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shoho Pay" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shoho Pay" />
    <meta property="og:title" content="Shoho Pay — The Future of Money. Built for the UAE." />
    <meta property="og:description" content="One app for payments, crypto, gold and AI-powered financial intelligence. Designed in Dubai." />
    <meta property="og:url" content="https://shohopay.com/" />
    <meta property="og:locale" content="en_AE" />
    <meta property="og:locale:alternate" content="ar_AE" />

    <!-- Twitter -->
    <meta property="og:image" content="https://shohopay.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shoho Pay — UAE Digital Wallet, Crypto, Gold & AI Finance" />
    <meta name="twitter:description" content="The luxury wallet of the UAE — payments, crypto, gold and Billy, your AI accountant." />
    <meta name="twitter:image" content="https://shohopay.com/og-image.png" />

    <!-- hreflang -->
    <link rel="alternate" hreflang="en" href="https://shohopay.com/" />
    <link rel="alternate" hreflang="ar" href="https://shohopay.com/ar" />
    <link rel="alternate" hreflang="x-default" href="https://shohopay.com/" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Shoho Pay",
      "url": "https://shohopay.com",
      "logo": "https://shohopay.com/logo.png",
      "description": "UAE-focused digital wallet with AI-powered financial intelligence.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dubai",
        "addressRegion": "DIFC",
        "addressCountry": "AE"
      },
      "sameAs": [
        "https://www.instagram.com/shoho_pay"
      ]
    }
    </script>

    <!-- JSON-LD: FinancialService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "Shoho Pay",
      "url": "https://shohopay.com",
      "areaServed": { "@type": "Country", "name": "United Arab Emirates" },
      "serviceType": ["Digital Wallet","Multi-Currency Payments","Cryptocurrency","Gold Investment","AI Financial Assistant"]
    }
    </script>

    <!-- JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Shoho Pay",
      "url": "https://shohopay.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://shohopay.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "Is Shoho Pay licensed in the UAE?", "acceptedAnswer": { "@type": "Answer", "text": "Shoho Pay operates aligned with UAE Central Bank guidelines and is registered in DIFC. Custody and gold vaulting are handled by regulated institutional partners." } },
        { "@type": "Question", "name": "What does Billy, the AI assistant, actually do?", "acceptedAnswer": { "@type": "Answer", "text": "Billy categorises spending in real time, builds adaptive budgets, forecasts your runway, negotiates better subscriptions and quietly auto-saves or auto-invests according to rules you set." } },
        { "@type": "Question", "name": "Can I redeem my digital gold as physical bars?", "acceptedAnswer": { "@type": "Answer", "text": "Any balance over 10g can be redeemed as physical 24K gold from our Dubai partner vault, with delivery or in-person collection." } },
        { "@type": "Question", "name": "Which currencies and assets are supported?", "acceptedAnswer": { "@type": "Answer", "text": "AED, USD, EUR, GBP, and 30+ more currencies. Plus BTC, ETH and majors for crypto, and 24K gold by the gram." } },
        { "@type": "Question", "name": "How is my money protected?", "acceptedAnswer": { "@type": "Answer", "text": "256-bit end-to-end encryption, biometric login, multi-sig cold custody for crypto, insured gold vaulting, ISO 27001 and PCI-DSS aligned operations." } }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
